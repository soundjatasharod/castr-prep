<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAST-R Prep — Tools of the Trade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #0A3D62;
  --blue-dark: #082d48;
  --amber: #F2A900;
  --amber-dark: #d49400;
  --copper: #B87333;
  --steel: #4A5560;
  --white: #F4F6F8;
  --green: #2E7D46;
  --dark: #23303A;
  --border: #C3CCD3;
  --bg: #F4F6F8;
  --card-bg: #ffffff;
  --text: #23303A;
  --text-muted: #4A5560;
  --radius: 6px;
  --shadow: 0 2px 8px rgba(10,61,98,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;font-size:16px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column}

/* BLUEPRINT GRID */
.blueprint-bg {
  background-color: var(--bg);
  background-image: linear-gradient(rgba(10,61,98,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(10,61,98,.045) 1px,transparent 1px);
  background-size: 28px 28px;
}

/* TYPOGRAPHY */
.oswald { font-family:'Oswald',sans-serif }
.mono { font-family:'IBM Plex Mono',monospace }
h1,h2,h3 { font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:.02em }

/* NAV */
.nav {
  background: var(--blue);
  padding: 0 16px;
  display: flex;
  align-items: center;
  height: 52px;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
}
.nav-logo { font-family:'Oswald',sans-serif; font-weight:700; font-size:1.1rem; color:#fff; letter-spacing:.05em; margin-right:auto; text-decoration:none; display:flex; align-items:center; gap:8px }
.nav-logo svg { flex-shrink:0 }
.nav-links { display:flex; gap:4px }
.nav-link { background:none; border:none; color:rgba(255,255,255,.7); font-family:'IBM Plex Sans',sans-serif; font-size:.82rem; font-weight:500; padding:6px 10px; border-radius:4px; cursor:pointer; text-transform:uppercase; letter-spacing:.06em; transition:color .15s,background .15s }
.nav-link:hover,.nav-link.active { color:#fff; background:rgba(255,255,255,.12) }
.nav-link.active { color:var(--amber) }
.nav-user { display:flex; align-items:center; gap:8px; margin-left:8px }
.nav-crew-badge { background:var(--amber); color:var(--blue); font-family:'Oswald',sans-serif; font-weight:700; font-size:.7rem; letter-spacing:.08em; padding:3px 8px; border-radius:3px; text-transform:uppercase }
.nav-name { color:rgba(255,255,255,.85); font-size:.82rem; font-weight:500 }

/* TEST MODE BANNER */
.test-banner { background:#7c3aed; color:#fff; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:.78rem; font-weight:600; padding:5px; letter-spacing:.1em }

/* DIMENSION DIVIDER */
.dim-divider { display:flex; align-items:center; gap:10px; margin: 12px 0 }
.dim-divider::before,.dim-divider::after { content:''; flex:1; height:1px; background:var(--border) }
.dim-divider::before { border-right:4px solid var(--border) }
.dim-divider::after { border-left:4px solid var(--border) }
.dim-divider span { font-family:'Oswald',sans-serif; font-size:.7rem; letter-spacing:.12em; color:var(--text-muted); text-transform:uppercase; white-space:nowrap }

/* CARD / NAMEPLATE */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  position: relative;
}
.card-rivet {
  position:absolute; width:8px; height:8px; border-radius:50%;
  background:var(--border); border:1px solid #b0bec5;
}
.card-rivet.tl{top:7px;left:7px} .card-rivet.tr{top:7px;right:7px}
.card-rivet.bl{bottom:7px;left:7px} .card-rivet.br{bottom:7px;right:7px}

/* BUTTONS */
.btn-primary { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:var(--amber); color:var(--blue); font-family:'Oswald',sans-serif; font-weight:700; font-size:1rem; letter-spacing:.06em; padding:13px 28px; border:none; border-radius:4px; cursor:pointer; transition:background .15s; text-transform:uppercase; text-decoration:none; width:100% }
.btn-primary:hover { background:var(--amber-dark) }
.btn-primary:disabled { background:#ccc; color:#888; cursor:not-allowed }
.btn-secondary { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:transparent; color:var(--blue); font-family:'Oswald',sans-serif; font-weight:600; font-size:.9rem; letter-spacing:.06em; padding:11px 24px; border:2px solid var(--blue); border-radius:4px; cursor:pointer; transition:all .15s; text-transform:uppercase; text-decoration:none; width:100% }
.btn-secondary:hover { background:var(--blue); color:#fff }
.btn-ghost { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:.85rem; text-decoration:underline; padding:6px 0; font-family:'IBM Plex Sans',sans-serif }
.btn-ghost:hover { color:var(--dark) }
.btn-inline { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:var(--amber); color:var(--blue); font-family:'Oswald',sans-serif; font-weight:700; font-size:.9rem; letter-spacing:.06em; padding:10px 22px; border:none; border-radius:4px; cursor:pointer; transition:background .15s; text-transform:uppercase }
.btn-inline:hover { background:var(--amber-dark) }
.btn-outline-inline { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:transparent; color:var(--blue); font-family:'Oswald',sans-serif; font-weight:600; font-size:.9rem; letter-spacing:.06em; padding:9px 20px; border:2px solid var(--blue); border-radius:4px; cursor:pointer; transition:all .15s; text-transform:uppercase }
.btn-outline-inline:hover { background:var(--blue); color:#fff }
.btn-danger { background:#d32f2f; color:#fff; font-family:'Oswald',sans-serif; font-weight:700; font-size:.9rem; letter-spacing:.06em; padding:10px 20px; border:none; border-radius:4px; cursor:pointer; transition:background .15s; text-transform:uppercase }
.btn-danger:hover { background:#b71c1c }

/* FORMS */
.field { display:flex; flex-direction:column; gap:5px }
.field label { font-size:.78rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--steel) }
.field input,.field select { border:1.5px solid var(--border); border-radius:4px; padding:10px 12px; font-size:1rem; font-family:'IBM Plex Sans',sans-serif; color:var(--dark); background:#fff; outline:none; transition:border-color .15s }
.field input:focus,.field select:focus { border-color:var(--blue) }
.field input::placeholder { color:#aab2ba }

/* PIN INPUT */
.pin-group { display:flex; gap:10px; justify-content:center }
.pin-box { width:52px; height:60px; border:2px solid var(--border); border-radius:6px; font-family:'IBM Plex Mono',monospace; font-size:1.8rem; font-weight:600; text-align:center; color:var(--dark); background:#fff; outline:none; transition:border-color .15s; -moz-appearance:textfield }
.pin-box::-webkit-inner-spin-button,.pin-box::-webkit-outer-spin-button{-webkit-appearance:none}
.pin-box:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(10,61,98,.12) }
.pin-box.filled { border-color:var(--blue) }

/* SCREENS */
.screen { flex:1; display:flex; flex-direction:column }
.screen-content { flex:1; padding:20px 16px; max-width:480px; width:100%; margin:0 auto }
.screen-content.wide { max-width:960px }
.screen-content.full { max-width:100%; padding:16px }

/* LANDING */
.landing-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 16px }
.landing-logo-area { text-align:center; margin-bottom:28px }
.landing-logo-area h1 { font-family:'Oswald',sans-serif; font-size:2.2rem; font-weight:700; color:var(--blue); letter-spacing:.05em; text-transform:uppercase }
.landing-logo-area .tagline { font-size:.85rem; color:var(--steel); letter-spacing:.1em; text-transform:uppercase; margin-top:4px; font-family:'IBM Plex Mono',monospace }
.landing-card { max-width:400px; width:100% }
.landing-form-row { display:flex; gap:12px }
.landing-form-row .field { flex:1 }

/* ONBOARDING */
.onboard-wrap { min-height:100vh; display:flex; flex-direction:column; padding:0 }
.onboard-top { background:var(--blue); color:#fff; padding:28px 20px 24px; text-align:center }
.onboard-top h2 { font-family:'Oswald',sans-serif; font-size:1.6rem; font-weight:700; letter-spacing:.04em }
.onboard-top p { font-size:.9rem; color:rgba(255,255,255,.75); margin-top:6px }
.onboard-body { flex:1; padding:24px 16px; max-width:480px; margin:0 auto; width:100% }
.step-indicator { display:flex; align-items:center; gap:8px; margin-bottom:20px }
.step-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:.8rem; font-weight:600 }
.step-dot.active { background:var(--amber); color:var(--blue) }
.step-dot.done { background:var(--green); color:#fff }
.step-dot.pending { background:var(--border); color:var(--steel) }
.step-line { flex:1; height:2px; background:var(--border) }
.step-line.done { background:var(--green) }

/* BREAKER PANEL */
.breaker-panel { background:#37474f; border-radius:8px; padding:16px 20px; border:3px solid #263238; box-shadow:inset 0 2px 8px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3) }
.breaker-panel-header { text-align:center; font-family:'Oswald',sans-serif; font-size:.8rem; letter-spacing:.2em; color:#90a4ae; text-transform:uppercase; margin-bottom:16px }
.breaker-list { display:flex; flex-direction:column; gap:10px }
.breaker { display:flex; align-items:center; gap:14px; background:#263238; border-radius:6px; padding:10px 14px; cursor:pointer; border:2px solid transparent; transition:border-color .15s; user-select:none }
.breaker:hover { border-color:#546e7a }
.breaker.selected { border-color:var(--amber) }
.breaker-switch-wrap { width:28px; height:54px; background:#1a2a32; border-radius:4px; border:1px solid #37474f; display:flex; align-items:flex-end; padding:3px; flex-shrink:0 }
.breaker-switch { width:100%; height:24px; border-radius:3px; transition:all .2s; background:#546e7a }
.breaker.selected .breaker-switch-wrap { align-items:flex-start }
.breaker.selected .breaker-switch { background:var(--amber); box-shadow:0 0 8px rgba(242,169,0,.6) }
.breaker-label { font-family:'Oswald',sans-serif; font-size:1rem; font-weight:600; color:#cfd8dc; letter-spacing:.04em }
.breaker.selected .breaker-label { color:#fff }
.breaker-indicator { width:8px; height:8px; border-radius:50%; margin-left:auto; background:#37474f; flex-shrink:0 }
.breaker.selected .breaker-indicator { background:var(--amber); box-shadow:0 0 6px rgba(242,169,0,.8) }

/* DASHBOARD */
.dashboard-greeting { padding:20px 0 10px }
.dashboard-greeting h2 { font-family:'Oswald',sans-serif; font-size:1.5rem; font-weight:700; color:var(--blue) }
.dashboard-greeting .subtitle { font-size:.85rem; color:var(--steel); margin-top:2px }
.sections-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0 }
.section-card { background:var(--card-bg); border:1.5px solid var(--border); border-radius:8px; padding:16px 14px; cursor:pointer; transition:border-color .15s,box-shadow .15s; text-align:left }
.section-card:hover { border-color:var(--blue); box-shadow:var(--shadow) }
.section-card .sc-icon { font-size:1.4rem; margin-bottom:8px }
.section-card .sc-label { font-family:'Oswald',sans-serif; font-size:.85rem; font-weight:600; color:var(--blue); letter-spacing:.05em; text-transform:uppercase; line-height:1.2 }
.section-card .sc-progress { font-family:'IBM Plex Mono',monospace; font-size:1.1rem; font-weight:600; color:var(--dark); margin-top:6px }
.section-card .sc-sub { font-size:.75rem; color:var(--steel); margin-top:2px }
.progress-bar-wrap { height:5px; background:#e8edf1; border-radius:3px; margin-top:8px; overflow:hidden }
.progress-bar-fill { height:100%; border-radius:3px; background:var(--amber); transition:width .3s }
.progress-bar-fill.green { background:var(--green) }

/* LEADERBOARD SNAPSHOT */
.leaderboard-snap { background:var(--blue); border-radius:8px; padding:14px 16px; color:#fff; cursor:pointer; margin-top:4px }
.leaderboard-snap h3 { font-family:'Oswald',sans-serif; font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.65); margin-bottom:10px }
.lb-crews { display:flex; gap:8px }
.lb-crew { flex:1; background:rgba(255,255,255,.1); border-radius:6px; padding:8px 10px; text-align:center }
.lb-crew-name { font-family:'Oswald',sans-serif; font-size:.75rem; letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,.7) }
.lb-crew-score { font-family:'IBM Plex Mono',monospace; font-size:1.1rem; font-weight:600; color:#fff; margin-top:3px }
.lb-crew.rank-1 .lb-crew-score { color:var(--amber) }
.lb-crew .lb-crew-rank { font-size:.65rem; color:rgba(255,255,255,.5); margin-top:1px }
.lb-tap-hint { font-size:.72rem; color:rgba(255,255,255,.5); text-align:center; margin-top:8px }

/* QUESTION SCREEN */
.question-screen { flex:1; display:flex; flex-direction:column }
.question-header { background:var(--blue); padding:12px 16px; display:flex; align-items:center; gap:10px }
.question-header .section-label { font-family:'Oswald',sans-serif; font-size:.8rem; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.7) }
.question-header .q-number { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--amber); margin-left:auto }
.question-body { flex:1; padding:16px; overflow-y:auto }
.drawing-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom:16px; background:#fff; border:1px solid var(--border); border-radius:6px; padding:8px }
.drawing-wrap svg { max-width:100%; height:auto; display:block; margin:0 auto }
.rc-passage-box { background:#f9fafc; border:1px solid var(--border); border-radius:6px; padding:14px 16px; margin-bottom:16px; font-size:.9rem; line-height:1.7; color:var(--dark); max-height:200px; overflow-y:auto }
.rc-passage-box h4 { font-family:'Oswald',sans-serif; font-size:.8rem; letter-spacing:.1em; text-transform:uppercase; color:var(--steel); margin-bottom:8px }
.q-prompt { font-size:1.05rem; font-weight:600; color:var(--dark); line-height:1.5; margin-bottom:16px }
.option-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px }
.option-btn { display:flex; align-items:flex-start; gap:12px; background:#fff; border:2px solid var(--border); border-radius:6px; padding:13px 14px; cursor:pointer; text-align:left; font-size:.95rem; color:var(--dark); transition:border-color .15s,background .15s; width:100% }
.option-btn:hover { border-color:var(--blue) }
.option-btn.selected { border-color:var(--blue); background:#eef4fa }
.option-letter { font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--blue); width:20px; flex-shrink:0; margin-top:1px }
.option-btn.selected .option-letter { color:var(--amber) }
.option-btn.correct { border-color:var(--green); background:#e8f5ec }
.option-btn.correct .option-letter { color:var(--green) }
.option-btn.incorrect { border-color:var(--copper); background:#fdf3e8 }
.option-btn.incorrect .option-letter { color:var(--copper) }
.question-actions { padding:0 16px 16px; display:flex; flex-direction:column; gap:8px }

/* FEEDBACK */
.feedback-result { padding:16px; border-radius:6px; margin-bottom:16px; display:flex; gap:12px; align-items:flex-start }
.feedback-result.correct { background:#e8f5ec; border:1.5px solid var(--green) }
.feedback-result.incorrect { background:#fdf3e8; border:1.5px solid var(--copper) }
.feedback-icon { font-size:1.4rem; flex-shrink:0; margin-top:2px }
.feedback-label { font-family:'Oswald',sans-serif; font-size:1rem; font-weight:700; letter-spacing:.05em }
.feedback-result.correct .feedback-label { color:var(--green) }
.feedback-result.incorrect .feedback-label { color:var(--copper) }
.feedback-rationale { font-size:.9rem; color:var(--dark); margin-top:4px; line-height:1.5 }
.flag-link-wrap { text-align:center; padding:4px 0 }

/* SESSION SUMMARY */
.summary-card { text-align:center; padding:32px 20px }
.summary-big { font-family:'IBM Plex Mono',monospace; font-size:3rem; font-weight:600; color:var(--blue) }
.summary-label { font-family:'Oswald',sans-serif; font-size:1rem; letter-spacing:.08em; color:var(--steel); text-transform:uppercase; margin-top:4px }
.summary-accuracy { font-family:'IBM Plex Mono',monospace; font-size:1.3rem; color:var(--amber); margin-top:8px }

/* PROGRESS */
.progress-section-card { background:var(--card-bg); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px }
.psc-header { display:flex; align-items:baseline; gap:10px; margin-bottom:10px }
.psc-title { font-family:'Oswald',sans-serif; font-size:.9rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--blue) }
.psc-count { font-family:'IBM Plex Mono',monospace; font-size:.8rem; color:var(--steel) }
.psc-stats { display:flex; gap:16px }
.psc-stat { text-align:center }
.psc-stat .val { font-family:'IBM Plex Mono',monospace; font-size:1.2rem; font-weight:600; color:var(--dark) }
.psc-stat .lbl { font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:var(--steel) }
.concept-callout { background:#f0f7ff; border:1px solid #c8dff5; border-radius:6px; padding:10px 12px; margin-top:10px; font-size:.85rem }
.concept-callout strong { color:var(--blue) }

/* LEADERBOARD */
.week-badge { display:inline-block; background:var(--blue); color:#fff; font-family:'IBM Plex Mono',monospace; font-size:.75rem; padding:4px 12px; border-radius:3px; letter-spacing:.08em; margin-bottom:16px }
.crew-lb-card { background:var(--card-bg); border:2px solid var(--border); border-radius:8px; padding:16px 18px; margin-bottom:12px; position:relative }
.crew-lb-card.rank-1 { border-color:var(--amber) }
.crew-lb-card.rank-1::before { content:'#1'; position:absolute; top:8px; right:10px; font-family:'IBM Plex Mono',monospace; font-size:.75rem; color:var(--amber); font-weight:600 }
.crew-lb-rank-num { font-family:'IBM Plex Mono',monospace; font-size:2.5rem; font-weight:600; color:var(--blue); float:right; margin-top:-4px }
.crew-lb-name { font-family:'Oswald',sans-serif; font-size:1.1rem; font-weight:700; color:var(--dark); letter-spacing:.04em }
.crew-lb-score { font-family:'IBM Plex Mono',monospace; font-size:1.3rem; font-weight:600; color:var(--amber); margin-top:4px }
.crew-lb-detail { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap }
.crew-lb-sec { font-size:.72rem; font-family:'IBM Plex Mono',monospace; color:var(--steel); background:#f4f6f8; padding:2px 6px; border-radius:3px }
.lb-no-data { text-align:center; padding:32px; color:var(--steel); font-size:.9rem }
.local-mode-banner { background:#fef3c7; border:1px solid #f59e0b; border-radius:6px; padding:10px 14px; font-size:.82rem; color:#92400e; margin-bottom:16px }

/* SETTINGS */
.settings-section { margin-bottom:20px }
.settings-section h3 { font-family:'Oswald',sans-serif; font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:var(--steel); margin-bottom:12px }
.locked-field { background:#f4f6f8; border:1.5px solid var(--border); border-radius:4px; padding:10px 12px; font-size:1rem; color:var(--steel); display:flex; align-items:center; justify-content:space-between }
.locked-field .lock-icon { font-size:.85rem; color:#aab2ba }

/* ADMIN */
.admin-kpi-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:20px }
.kpi-card { background:var(--card-bg); border:1px solid var(--border); border-radius:6px; padding:12px 14px }
.kpi-val { font-family:'IBM Plex Mono',monospace; font-size:1.6rem; font-weight:600; color:var(--blue) }
.kpi-lbl { font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; color:var(--steel); margin-top:2px }
.admin-section-title { font-family:'Oswald',sans-serif; font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:var(--steel); margin:16px 0 8px; display:flex; align-items:center; gap:10px }
.admin-table-wrap { overflow-x:auto; border-radius:6px; border:1px solid var(--border); margin-bottom:20px }
table { width:100%; border-collapse:collapse; font-size:.82rem }
thead { background:#f0f4f8 }
th { font-family:'Oswald',sans-serif; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--steel); padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; cursor:pointer; user-select:none }
th:hover { color:var(--blue) }
th .sort-arrow { margin-left:4px; opacity:.5 }
td { padding:9px 12px; border-bottom:1px solid #edf0f4; vertical-align:middle }
tr:last-child td { border-bottom:none }
tbody tr:hover { background:#f8fafc }
.editable-cell { cursor:pointer; border-bottom:1px dashed var(--border) }
.editable-cell:hover { color:var(--blue) }
.edit-input { font-family:'IBM Plex Mono',monospace; font-size:.82rem; border:1px solid var(--blue); border-radius:3px; padding:3px 6px; width:80px; outline:none }
.flag-item { background:var(--card-bg); border:1px solid var(--border); border-radius:6px; padding:12px 14px; margin-bottom:8px }
.flag-item-header { display:flex; gap:8px; align-items:baseline; margin-bottom:4px }
.flag-qid { font-family:'IBM Plex Mono',monospace; font-size:.8rem; color:var(--blue); font-weight:600 }
.flag-who { font-size:.78rem; color:var(--steel) }
.flag-time { font-size:.72rem; color:var(--steel); margin-left:auto }
.flag-reason { font-size:.85rem; color:var(--dark); font-style:italic }
.filter-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px }
.chip { background:#f4f6f8; border:1.5px solid var(--border); border-radius:16px; padding:4px 12px; font-size:.78rem; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:all .15s; white-space:nowrap }
.chip.active { background:var(--blue); color:#fff; border-color:var(--blue) }
.toggle-wrap { display:flex; align-items:center; gap:12px }
.toggle { position:relative; display:inline-block; width:46px; height:26px }
.toggle input { opacity:0; width:0; height:0 }
.toggle-slider { position:absolute; cursor:pointer; top:0;left:0;right:0;bottom:0; background:#ccc; border-radius:26px; transition:.3s }
.toggle-slider:before { position:absolute; content:''; height:20px; width:20px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.3s }
input:checked + .toggle-slider { background:var(--amber) }
input:checked + .toggle-slider:before { transform:translateX(20px) }
.test-mode-indicator { background:#7c3aed; color:#fff; font-family:'IBM Plex Mono',monospace; font-size:.75rem; padding:4px 10px; border-radius:12px; margin-left:8px }
.expanded-row { background:#f8fafc }
.expanded-row td { padding:12px 16px }
.student-detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px }
.student-detail-item { background:#fff; border:1px solid var(--border); border-radius:6px; padding:10px }
.student-detail-item .label { font-size:.68rem; text-transform:uppercase; letter-spacing:.08em; color:var(--steel) }
.student-detail-item .val { font-family:'IBM Plex Mono',monospace; font-size:1.1rem; font-weight:600; color:var(--dark); margin-top:2px }
.student-detail-item .sub { font-size:.72rem; color:var(--steel) }

/* SPARKLINE */
.sparkline-wrap { display:inline-flex; align-items:center; gap:4px }
.sparkline-wrap svg { display:block }

/* CREW COLORS */
.crew-oakbrook { color:#0A3D62 }
.crew-rockford { color:#B87333 }
.crew-chicago { color:#2E7D46 }
.crew-badge-oakbrook { background:#0A3D62; color:#fff }
.crew-badge-rockford { background:#B87333; color:#fff }
.crew-badge-chicago { background:#2E7D46; color:#fff }

/* MISC */
.page-title { font-family:'Oswald',sans-serif; font-size:1.4rem; font-weight:700; color:var(--blue); letter-spacing:.03em; margin-bottom:4px }
.page-sub { font-size:.85rem; color:var(--steel); margin-bottom:16px }
.loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--steel); font-family:'IBM Plex Mono',monospace; font-size:.85rem }
.empty { text-align:center; padding:32px; color:var(--steel) }
.notice { background:#fef3c7; border:1px solid #f59e0b; border-radius:6px; padding:12px 14px; font-size:.85rem; color:#92400e; margin-bottom:14px }
.success-notice { background:#e8f5ec; border:1px solid var(--green); border-radius:6px; padding:12px 14px; font-size:.85rem; color:#1b5e20; margin-bottom:14px }
.mono-num { font-family:'IBM Plex Mono',monospace }

/* MODAL / OVERLAY */
.overlay { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:flex-end; justify-content:center }
.overlay-panel { background:#fff; border-radius:12px 12px 0 0; padding:24px 20px 32px; width:100%; max-width:480px; max-height:80vh; overflow-y:auto }
.overlay-panel h3 { font-family:'Oswald',sans-serif; font-size:1.1rem; font-weight:700; color:var(--blue); margin-bottom:12px }

@media(min-width:640px){
  .sections-grid{grid-template-columns:repeat(4,1fr)}
  .landing-form-row{gap:16px}
  .overlay{align-items:center}
  .overlay-panel{border-radius:12px;max-width:440px}
  .nav-link{font-size:.85rem;padding:8px 12px}
}
@media(max-width:400px){
  .sections-grid{grid-template-columns:1fr 1fr}
  .lb-crews{flex-direction:column}
  .pin-box{width:44px;height:54px;font-size:1.5rem}
}
</style>

  {id:'mu_q23',subskill:'geometry',prompt:'A circular manhole cover has a radius of 14 inches. What is its area? (Use π ≈ 3.14)',
   opts:[{l:'A',t:'528 sq in',c:false},{l:'B',t:'572 sq in',c:false},{l:'C',t:'616 sq in',c:true},{l:'D',t:'660 sq in',c:false}],rationale:'π × 14² ≈ 3.14 × 196 ≈ 616 sq in'},
  {id:'mu_q24',subskill:'geometry',prompt:'A utility vault is 6 ft long, 4 ft wide, and 3 ft deep. What is its volume?',

const MC_QUESTIONS = [
  {id:'mc_q1',concept:'levers',prompt:'A worker uses a 36-inch pry bar with the fulcrum 4 inches from the load. Gripping at the far end versus gripping halfway down the bar — which grip requires less force?',opts:[{l:'A',t:'Gripping at the far end',c:true},{l:'B',t:'Gripping halfway down',c:false},{l:'C',t:'Both grips require equal force',c:false}],rationale:"Effort arm 32\" vs 14\": the longer effort arm needs less force."},
  {id:'mc_q2',concept:'levers',prompt:'Two workers pry up identical crates with identical bars. Worker A sets the fulcrum closer to the crate than Worker B does. Who exerts less force?',opts:[{l:'A',t:'Worker A',c:true},{l:'B',t:'Worker B',c:false},{l:'C',t:'Both exert equal force',c:false}],rationale:'Fulcrum nearer the load shortens the load arm and lengthens the effort arm, reducing required force.'},
  {id:'mc_q3',concept:'levers',prompt:'A wheelbarrow is loaded with bricks. Which placement makes it easier to lift the handles — bricks stacked near the wheel, or bricks stacked near the handles?',opts:[{l:'A',t:'Near the wheel',c:true},{l:'B',t:'Near the handles',c:false},{l:'C',t:'Both placements lift equally',c:false}],rationale:'The wheel is the fulcrum; moving the load closer to it shortens the load arm.'},
  {id:'mc_q4',concept:'levers',prompt:'A 60-pound toolbox sits 6 feet from a beam\'s pivot. To balance it, how much weight must be placed 4 feet from the pivot on the other side?',opts:[{l:'A',t:'40 pounds',c:false},{l:'B',t:'90 pounds',c:true},{l:'C',t:'120 pounds',c:false}],rationale:'60 × 6 = 360; 360 ÷ 4 = 90 pounds.'},
  {id:'mc_q5',concept:'levers',prompt:'Two claw hammers pull identical nails. Hammer A has a longer handle than Hammer B. Gripped at the end, which requires less force to pull the nail?',opts:[{l:'A',t:'Hammer A',c:true},{l:'B',t:'Hammer B',c:false},{l:'C',t:'Both require equal force',c:false}],rationale:'The longer handle is a longer effort arm around the hammer-head fulcrum.'},
  {id:'mc_q6',concept:'pulleys',prompt:'Two rigs lift identical engine blocks. Rig A uses one movable pulley; Rig B uses one fixed pulley. Which requires less pulling force?',opts:[{l:'A',t:'Rig A',c:true},{l:'B',t:'Rig B',c:false},{l:'C',t:'Both require equal force',c:false}],rationale:'A movable pulley splits the load across two rope strands (MA=2); a fixed pulley just changes direction (MA=1).'},
  {id:'mc_q7',concept:'pulleys',prompt:'A block-and-tackle with two supporting rope strands lifts a 120-pound motor. Ignoring friction, about how much pulling force is required?',opts:[{l:'A',t:'60 pounds',c:true},{l:'B',t:'120 pounds',c:false},{l:'C',t:'240 pounds',c:false}],rationale:'120 ÷ 2 supporting strands = 60 pounds.'},
  {id:'mc_q8',concept:'pulleys',prompt:'A rigger adds more supporting rope strands to a hoist. What happens to the force needed to lift the same load?',opts:[{l:'A',t:'It decreases',c:true},{l:'B',t:'It increases',c:false},{l:'C',t:'It stays the same',c:false}],rationale:'Force = load ÷ number of supporting strands.'},
  {id:'mc_q9',concept:'pulleys',prompt:'A single fixed pulley at the top of a pole lets a worker pull down to raise a bucket. Compared with hauling the bucket straight up by hand, the required force is:',opts:[{l:'A',t:'Less',c:false},{l:'B',t:'The same',c:true},{l:'C',t:'Greater',c:false}],rationale:'One fixed pulley redirects the pull but the tension still equals the full load.'},
  {id:'mc_q10',concept:'pulleys',prompt:'Three hoists lift the same crate: one supporting strand, two strands, and four strands. Which lifts with the least effort?',opts:[{l:'A',t:'One strand',c:false},{l:'B',t:'Two strands',c:false},{l:'C',t:'Four strands',c:true}],rationale:'Load ÷ 4 is the smallest required force.'},
  {id:'mc_q11',concept:'gears',prompt:'Two gears mesh directly. If the left gear turns clockwise, the right gear turns:',opts:[{l:'A',t:'Clockwise',c:false},{l:'B',t:'Counterclockwise',c:true},{l:'C',t:'It alternates',c:false}],rationale:'Direct meshing reverses rotation.'},
  {id:'mc_q12',concept:'gears',prompt:'Three gears mesh in a row. If the first gear spins clockwise, which way does the third gear spin?',opts:[{l:'A',t:'Clockwise',c:true},{l:'B',t:'Counterclockwise',c:false},{l:'C',t:'It depends on gear size',c:false}],rationale:'Each mesh reverses direction: CW → CCW → CW. Two reversals return to clockwise.'},
  {id:'mc_q13',concept:'gears',prompt:'A 12-tooth gear drives a 36-tooth gear. For every turn of the large gear, the small gear turns:',opts:[{l:'A',t:'3 times',c:true},{l:'B',t:'1/3 of a turn',c:false},{l:'C',t:'36 times',c:false}],rationale:'36 ÷ 12 = 3 small-gear turns per large-gear turn.'},
  {id:'mc_q14',concept:'gears',prompt:'In a gear train with small, medium, and large meshed gears, which spins fastest?',opts:[{l:'A',t:'The small gear',c:true},{l:'B',t:'The medium gear',c:false},{l:'C',t:'The large gear',c:false}],rationale:'Angular speed is inversely proportional to size/tooth count in meshed gears.'},
  {id:'mc_q15',concept:'gears',prompt:'Two wheels are connected by a straight (uncrossed) drive belt. If one turns clockwise, the other turns:',opts:[{l:'A',t:'Clockwise',c:true},{l:'B',t:'Counterclockwise',c:false},{l:'C',t:'It alternates',c:false}],rationale:'A belt carries motion without reversing it — unlike meshed teeth.'},
  {id:'mc_q16',concept:'incline_planes',prompt:'Two ramps reach the same truck bed: one 12 feet long, one 6 feet long. Which requires less force to roll a drum up?',opts:[{l:'A',t:'The 12-foot ramp',c:true},{l:'B',t:'The 6-foot ramp',c:false},{l:'C',t:'Both require equal force',c:false}],rationale:'Same rise over more run = shallower angle = less force (over more distance).'},
  {id:'mc_q17',concept:'incline_planes',prompt:'Two loading-dock ramps rise to the same platform. Ramp A is steeper than Ramp B. Pushing identical carts up, which ramp requires more force?',opts:[{l:'A',t:'Ramp A',c:true},{l:'B',t:'Ramp B',c:false},{l:'C',t:'Both require equal force',c:false}],rationale:'Force scales with the sine of the incline angle.'},
  {id:'mc_q18',concept:'incline_planes',prompt:'A ramp is replaced with one twice as long reaching the same height. Ignoring friction, the force needed to push a load up becomes:',opts:[{l:'A',t:'Half as much',c:true},{l:'B',t:'Twice as much',c:false},{l:'C',t:'Unchanged',c:false}],rationale:'F = W×h/L: doubling L halves F.'},
  {id:'mc_q19',concept:'incline_planes',prompt:'Compared with lifting a barrel straight up onto a platform, rolling it up a ramp to the same platform requires:',opts:[{l:'A',t:'Less force over a longer distance',c:true},{l:'B',t:'More force over a shorter distance',c:false},{l:'C',t:'The same force either way',c:false}],rationale:'The incline spreads the same work over more distance, lowering the force.'},
  {id:'mc_q20',concept:'friction',prompt:'A loaded pallet is dragged first across gravel, then across a smooth steel plate. On which surface is it easier to drag?',opts:[{l:'A',t:'The steel plate',c:true},{l:'B',t:'The gravel',c:false},{l:'C',t:'Equally easy on both',c:false}],rationale:'Smoother surface = lower coefficient of friction = less drag force.'},
  {id:'mc_q21',concept:'friction',prompt:'Sand is scattered on a smooth floor where a crate is being slid. Sliding the crate becomes:',opts:[{l:'A',t:'Harder',c:true},{l:'B',t:'Easier',c:false},{l:'C',t:'No different',c:false}],rationale:'The sand raises the effective roughness between crate and floor.'},
  {id:'mc_q22',concept:'friction',prompt:'A heavy cabinet can be slid across the floor or moved on rolling dollies. Which requires less force?',opts:[{l:'A',t:'Rolling on dollies',c:true},{l:'B',t:'Sliding it',c:false},{l:'C',t:'Both require equal force',c:false}],rationale:'Rolling resistance is much smaller than sliding friction for the same load.'},
  {id:'mc_q23',concept:'friction',prompt:'For standing on while working, which surface gives a boot more grip: wet ice or a dry rubber mat?',opts:[{l:'A',t:'The dry rubber mat',c:true},{l:'B',t:'The wet ice',c:false},{l:'C',t:'Both grip equally',c:false}],rationale:'Rubber on dry surface has a far higher friction coefficient than wet ice.'},
  {id:'mc_q24',concept:'momentum',prompt:'A fully loaded dump truck and an empty pickup travel at the same speed. Which takes more braking effort to stop?',opts:[{l:'A',t:'The dump truck',c:true},{l:'B',t:'The pickup',c:false},{l:'C',t:'Both stop equally easily',c:false}],rationale:'Same speed, far more mass — far more momentum to remove.'},
  {id:'mc_q25',concept:'momentum',prompt:'Two carts collide head-on at the same speed. Cart A weighs twice as much as Cart B. After the collision, the tangled carts move:',opts:[{l:'A',t:"In Cart A's original direction",c:true},{l:'B',t:"In Cart B's original direction",c:false},{l:'C',t:'They stop dead',c:false}],rationale:"A's momentum (2m×v) exceeds B's (m×v), so the combined pair keeps A's direction."},
  {id:'mc_q26',concept:'momentum',prompt:'Which has more momentum: a 2-ton truck at 30 mph or a 1-ton car at 50 mph?',opts:[{l:'A',t:'The truck',c:true},{l:'B',t:'The car',c:false},{l:'C',t:"They're equal",c:false}],rationale:'2×30=60 vs 1×50=50 — the truck has more.'},
  {id:'mc_q27',concept:'center_of_mass',prompt:'Two workers carry a long ladder with a paint bucket hung from it, closer to Worker B\'s end. Who supports more weight?',opts:[{l:'A',t:'Worker B',c:true},{l:'B',t:'Worker A',c:false},{l:'C',t:'Both support it equally',c:false}],rationale:'Load distribution is inversely proportional to distance — the nearer carrier takes the larger share.'},
  {id:'mc_q28',concept:'center_of_mass',prompt:'Two identical shelving units hold the same boxes: one loaded top-heavy, one loaded bottom-heavy. Which tips over more easily if bumped?',opts:[{l:'A',t:'The top-heavy unit',c:true},{l:'B',t:'The bottom-heavy unit',c:false},{l:'C',t:'Both tip equally easily',c:false}],rationale:'Raising the center of gravity reduces the tilt angle needed to pass the tipping point.'},
  {id:'mc_q29',concept:'center_of_mass',prompt:'To carry a long uniform pipe one-handed with no tipping, a worker should grip it:',opts:[{l:'A',t:'At its middle',c:true},{l:'B',t:'Near one end',c:false},{l:'C',t:"Anywhere — it won't tip",c:false}],rationale:"A uniform pipe's center of gravity is at its midpoint; support there balances the torques."},
  {id:'mc_q30',concept:'gas_pressure',prompt:'The same amount of compressed air is stored first in a large tank, then transferred entirely into a smaller tank at the same temperature. In the smaller tank the pressure is:',opts:[{l:'A',t:'Higher',c:true},{l:'B',t:'Lower',c:false},{l:'C',t:'The same',c:false}],rationale:'P ∝ 1/V for a fixed amount of gas at constant temperature.'},
  {id:'mc_q31',concept:'gas_pressure',prompt:'A sealed cylinder of air is heated. The pressure inside:',opts:[{l:'A',t:'Increases',c:true},{l:'B',t:'Decreases',c:false},{l:'C',t:'Stays the same',c:false}],rationale:"P ∝ T at constant volume (Gay-Lussac's law)."},
  {id:'mc_q32',concept:'gas_pressure',prompt:'Half the air is released from a rigid tank at constant temperature. The tank\'s pressure becomes:',opts:[{l:'A',t:'About half of what it was',c:true},{l:'B',t:'About double',c:false},{l:'C',t:'Unchanged',c:false}],rationale:'Pressure is proportional to the amount of gas in a fixed volume at fixed temperature.'},
  {id:'mc_q33',concept:'pistons',prompt:'Fuel vapor ignites in a cylinder beneath a piston. The piston is pushed:',opts:[{l:'A',t:'Away from the burning gas',c:true},{l:'B',t:'Toward the burning gas',c:false},{l:'C',t:"It doesn't move",c:false}],rationale:'Combustion spikes the gas pressure, which forces the piston outward.'},
  {id:'mc_q34',concept:'pistons',prompt:'A piston rapidly compresses the air in a sealed cylinder. The trapped air becomes:',opts:[{l:'A',t:'Hotter and higher pressure',c:true},{l:'B',t:'Cooler and lower pressure',c:false},{l:'C',t:'Unchanged',c:false}],rationale:'Work done on the gas raises its internal energy — pressure and temperature both climb.'},
  {id:'mc_q35',concept:'pistons',prompt:'In a hydraulic jack, pushing down the small piston makes the large piston:',opts:[{l:'A',t:'Rise with greater force',c:true},{l:'B',t:'Rise with less force',c:false},{l:'C',t:'Stay still',c:false}],rationale:'Equal pressure × larger area = larger force (moving a shorter distance).'},
  {id:'mc_q36',concept:'fluid_dynamics',prompt:'Water flows through a pipe that narrows midway. In the narrow section, the water moves:',opts:[{l:'A',t:'Faster',c:true},{l:'B',t:'Slower',c:false},{l:'C',t:'At the same speed',c:false}],rationale:'Flow rate (area × velocity) is constant, so smaller area means higher velocity.'},
  {id:'mc_q37',concept:'fluid_dynamics',prompt:'The same volume of water per second passes through a wide section and a narrow section of one pipe. Where is the water slowest?',opts:[{l:'A',t:'The wide section',c:true},{l:'B',t:'The narrow section',c:false},{l:'C',t:'Equal speed in both',c:false}],rationale:'Velocity = flow rate ÷ area: bigger area, slower water.'},
  {id:'mc_q38',concept:'fluid_dynamics',prompt:'Pressing a thumb over the end of a garden hose makes the water stream:',opts:[{l:'A',t:'Faster',c:true},{l:'B',t:'Slower',c:false},{l:'C',t:'Unchanged',c:false}],rationale:'The same flow forced through a smaller opening exits at higher speed.'},
  {id:'mc_q39',concept:'fluid_dynamics',prompt:'Two identical full tanks drain through bottom holes; one hole is wider. Which tank empties first?',opts:[{l:'A',t:'The one with the wider hole',c:true},{l:'B',t:'The one with the narrower hole',c:false},{l:'C',t:'Both empty together',c:false}],rationale:'Volume flow scales with outlet area for a similar outflow speed.'},
  {id:'mc_q40',concept:'buoyancy',prompt:'The same sealed crate is floated in seawater and in fresh water. In which does it float higher?',opts:[{l:'A',t:'Seawater',c:true},{l:'B',t:'Fresh water',c:false},{l:'C',t:'Equally in both',c:false}],rationale:"Seawater is denser, so less displaced volume supports the crate's weight."},
  {id:'mc_q41',concept:'buoyancy',prompt:'A cork ball and a solid steel ball of the same size are dropped into water. Which floats?',opts:[{l:'A',t:'The cork ball',c:true},{l:'B',t:'The steel ball',c:false},{l:'C',t:'Both float',c:false}],rationale:'Cork is less dense than water; steel is denser and sinks.'},
  {id:'mc_q42',concept:'buoyancy',prompt:'As cargo is loaded onto a barge, the barge:',opts:[{l:'A',t:'Sits lower in the water',c:true},{l:'B',t:'Rises higher',c:false},{l:'C',t:'Stays at the same level',c:false}],rationale:'More weight needs more buoyant force, which needs more displaced water.'},
  {id:'mc_q43',concept:'buoyancy',prompt:'A solid object is denser than water. Placed in a tank, it will:',opts:[{l:'A',t:'Sink',c:true},{l:'B',t:'Float',c:false},{l:'C',t:'Hover mid-depth',c:false}],rationale:'Its weight exceeds the maximum buoyant force available at full submersion.'},
  {id:'mc_q44',concept:'water_pressure',prompt:'Two full tanks: one 20 feet deep, one 10 feet deep. At which tank\'s bottom is the water pressure greater?',opts:[{l:'A',t:'The 20-foot tank',c:true},{l:'B',t:'The 10-foot tank',c:false},{l:'C',t:'Equal at both bottoms',c:false}],rationale:'Pressure is proportional to depth of water above the point.'},
  {id:'mc_q45',concept:'water_pressure',prompt:'Two identical water tanks feed identical hoses at ground level. Tank A sits on a taller stand than Tank B. Which hose has greater water pressure?',opts:[{l:'A',t:"Tank A's hose",c:true},{l:'B',t:"Tank B's hose",c:false},{l:'C',t:'Both are equal',c:false}],rationale:'Outlet pressure scales with the height of the water column above the outlet.'},
  {id:'mc_q46',concept:'water_pressure',prompt:'A barrel full of water has two small holes: one near the top, one near the bottom. Which hole\'s stream shoots out farther?',opts:[{l:'A',t:'The bottom hole',c:true},{l:'B',t:'The top hole',c:false},{l:'C',t:'Both shoot equally far',c:false}],rationale:'More water above the bottom hole means higher pressure and a faster exit stream.'},
  {id:'mc_q47',concept:'circuits',prompt:'Two switches are wired in series with a bulb. For the bulb to light:',opts:[{l:'A',t:'Both switches must be closed',c:true},{l:'B',t:'Either switch alone can light it',c:false},{l:'C',t:'Neither needs to be closed',c:false}],rationale:'Series devices share one path — any open switch breaks it.'},
  {id:'mc_q48',concept:'circuits',prompt:'Two switches are wired in parallel with a bulb. The bulb lights when:',opts:[{l:'A',t:'Either switch is closed',c:true},{l:'B',t:'Both must be closed',c:false},{l:'C',t:'Only if both are open',c:false}],rationale:'Parallel paths are independent — one closed path is enough.'},
  {id:'mc_q49',concept:'circuits',prompt:'A string of work lights is wired in series. If one lamp\'s filament breaks, the other lamps:',opts:[{l:'A',t:'All go dark',c:true},{l:'B',t:'Stay lit',c:false},{l:'C',t:'Get brighter',c:false}],rationale:'The break opens the only current path for the whole loop.'},
  {id:'mc_q50',concept:'circuits',prompt:'A panel has one master switch on the supply line and separate branch switches for each tool. Which switch de-energizes every tool at once?',opts:[{l:'A',t:'The master switch',c:true},{l:'B',t:'Any branch switch',c:false},{l:'C',t:'No single switch can',c:false}],rationale:'Everything downstream depends on the main line; branches only control their own tool.'},
  {id:'mc_q51',concept:'circuits',prompt:'A fuse in a circuit blows. Current in that circuit:',opts:[{l:'A',t:'Stops',c:true},{l:'B',t:'Doubles',c:false},{l:'C',t:'Continues unchanged',c:false}],rationale:'A blown fuse is an open — it breaks the conducting path on purpose.'},
  {id:'mc_q52',concept:'rotational_motion',prompt:'On a spinning flywheel, one mark sits at the rim and one halfway to the center. In one rotation, which mark travels the greater distance?',opts:[{l:'A',t:'The rim mark',c:true},{l:'B',t:'The halfway mark',c:false},{l:'C',t:'Both travel the same distance',c:false}],rationale:'Circumference scales with radius — the rim traces the bigger circle.'},
  {id:'mc_q53',concept:'rotational_motion',prompt:'Two carts have different wheel sizes. Per single wheel revolution, which cart moves farther: the one with larger wheels or smaller wheels?',opts:[{l:'A',t:'Larger wheels',c:true},{l:'B',t:'Smaller wheels',c:false},{l:'C',t:'Both move the same',c:false}],rationale:'One revolution covers one circumference, and larger wheels have larger circumference.'},
  {id:'mc_q54',concept:'rotational_motion',prompt:'Two points on the same spinning shaft — one near the center, one at the edge — complete each full rotation:',opts:[{l:'A',t:'In the same amount of time',c:true},{l:'B',t:'Edge point takes longer',c:false},{l:'C',t:'Center point takes longer',c:false}],rationale:'Every point on a rigid rotating body shares the same rotation period; only linear speed differs.'},
  {id:'mc_q55',concept:'projectile_motion',prompt:'A bolt is tossed upward in an arc across a trench. At what point in its flight is it moving slowest?',opts:[{l:'A',t:'At the top of the arc',c:true},{l:'B',t:'Just after leaving the hand',c:false},{l:'C',t:'Just before landing',c:false}],rationale:"Vertical velocity is zero at the peak, leaving only the horizontal component."},
  {id:'mc_q56',concept:'projectile_motion',prompt:'A wrench slips from a scaffold. As it falls, its speed:',opts:[{l:'A',t:'Increases',c:true},{l:'B',t:'Decreases',c:false},{l:'C',t:'Stays constant',c:false}],rationale:'Gravity accelerates it continuously at ~32 ft/s² (ignoring air resistance).'},
  {id:'mc_q57',concept:'springs',prompt:'Identical spring launchers are compressed 2 inches and 4 inches. Which sends an identical part farther?',opts:[{l:'A',t:'The 4-inch compression',c:true},{l:'B',t:'The 2-inch compression',c:false},{l:'C',t:'Both launch equally far',c:false}],rationale:'Restoring force and stored energy grow with compression distance (F = kx).'},
  {id:'mc_q58',concept:'springs',prompt:'A stiff spring and a soft spring are compressed the same distance. Which pushes back harder?',opts:[{l:'A',t:'The stiff spring',c:true},{l:'B',t:'The soft spring',c:false},{l:'C',t:'Both push equally',c:false}],rationale:'F = kx: at equal x, larger k gives larger force.'},
  {id:'mc_q59',concept:'vehicle_stability',prompt:'A forklift rounds a corner carrying a pallet. Is it more stable with the pallet raised high or kept low?',opts:[{l:'A',t:'Kept low',c:true},{l:'B',t:'Raised high',c:false},{l:'C',t:'Height makes no difference',c:false}],rationale:'A high load raises the center of gravity, making tip-over far easier in a turn.'},
  {id:'mc_q60',concept:'vehicle_stability',prompt:'Two flatbeds carry equal weight: one stacked tall in a single column, one spread low across the bed. Which is less likely to tip on a sharp curve?',opts:[{l:'A',t:'The spread-low load',c:true},{l:'B',t:'The tall-stacked load',c:false},{l:'C',t:'Both are equally stable',c:false}],rationale:'Spreading the load low keeps the center of gravity down and inside the wheelbase.'}
];

const RC_PASSAGES = {
  rc_p1:{title:'Lockout/Tagout',text:'Before servicing electrical equipment, workers follow a procedure called lockout/tagout. The purpose of lockout/tagout is to prevent machines from starting unexpectedly while someone is working on them. First, the worker shuts the equipment down and disconnects it from its energy source. Next, the worker places a personal lock on the energy-isolating device so it cannot be switched back on. A tag is attached to the lock identifying who placed it and why. Only the worker who placed the lock is permitted to remove it. This rule exists because the person who placed the lock is the one whose safety depends on the equipment staying off. Skipping any step of the procedure, even to save time, is considered a serious safety violation.'},
  rc_p2:{title:'How Transformers Work',text:'A transformer changes the voltage of alternating current electricity. It contains two coils of wire, called the primary and secondary coils, wound around a shared iron core. Electricity entering the primary coil creates a changing magnetic field in the core. That magnetic field induces a current in the secondary coil, even though the two coils are not physically connected. If the secondary coil has more turns of wire than the primary, the voltage is increased. This is called a step-up transformer. If the secondary coil has fewer turns, the voltage is decreased, which is called a step-down transformer. Utilities use step-up transformers to raise voltage for efficient long-distance transmission, and step-down transformers near homes and businesses to lower it to safe, usable levels.'},
  rc_p3:{title:'Personal Protective Equipment',text:'Personal protective equipment, or PPE, is the last line of defense against jobsite hazards. Employers are required to first try to eliminate or reduce hazards through equipment design and safe work procedures. PPE protects a worker when a hazard cannot be fully removed. Different hazards call for different equipment: hard hats protect against falling objects, safety glasses shield the eyes from flying debris, hearing protection guards against loud machinery, and insulated gloves protect electrical workers from shock. PPE only works when it fits properly and is worn consistently. A hard hat left in the truck protects no one. Workers are expected to inspect their equipment before each use and replace anything cracked, torn, or worn out.'},
  rc_p4:{title:'Lewis Latimer',text:'Lewis Latimer was born in Massachusetts in 1848, the son of parents who had escaped slavery. He taught himself mechanical drawing while working at a patent law office, where his skill earned him a promotion from office boy to draftsman. In 1876, Alexander Graham Bell hired Latimer to draft the drawings for his telephone patent application. Latimer later joined the electric lighting industry, where he patented an improved process for making carbon filaments in 1882. His filaments made electric light bulbs longer-lasting and more affordable than earlier designs. Latimer supervised the installation of electric lighting in several major cities and later worked for Thomas Edison\'s company. In 1890 he published a book explaining incandescent lighting to the general public. His career shows how skill and persistence opened doors in a young industry.'},
  rc_p5:{title:'How Electricity Reaches Your Home',text:'Electricity travels from power plants to homes through a network called the grid. At the power plant, generators produce electricity, which is stepped up to very high voltage for transmission. High voltage is used because it reduces the amount of energy lost as heat over long-distance lines. Transmission lines carry the power across regions to substations, where the voltage is stepped down. From substations, distribution lines carry electricity through neighborhoods. A final transformer, often mounted on a utility pole or a ground-level pad, lowers the voltage once more to the level used inside homes. The grid must balance supply and demand at every moment, because large amounts of electricity cannot easily be stored. Grid operators constantly adjust generation to match what customers are using.'},
  rc_p6:{title:'Caring for Hand Tools',text:'Hand tools last longest when they are cleaned, inspected, and stored properly. After each use, tools should be wiped free of dirt, moisture, and grease, because trapped moisture leads to rust. Cutting tools should be kept sharp; a dull blade requires more force, which increases the chance of slipping and causing injury. Wooden handles should be checked for cracks and splinters, and any loose head should be repaired before the tool is used again. Tools should be stored in a dry place, each with its own spot, so missing tools are noticed quickly. A little maintenance after each job prevents most tool failures and keeps replacement costs down.'},
  rc_p7:{title:'Reading a Work Order',text:'A work order is the written instruction that tells a crew what job to perform, where, and when. A complete work order lists the job location, a description of the work, the materials required, and any special safety notes. Before starting, the crew lead reads the entire order and confirms the address matches the site. Working from memory instead of the written order is a common cause of mistakes, such as installing the wrong part or performing work at the wrong unit in a large building. If any part of the order is unclear or seems incorrect, the crew is expected to contact the dispatcher before beginning, not after the work is finished. Completed orders are signed and returned, creating a record of exactly what was done.'},
  rc_p8:{title:'Why Near-Misses Get Reported',text:'On many jobsites, workers are required to report near-misses — incidents that could have caused injury but did not. A dropped wrench that lands a foot from a coworker causes no harm, yet it reveals a hazard: unsecured tools overhead. Safety researchers have long observed that for every serious injury, there are typically many minor incidents and an even larger number of near-misses involving the same underlying causes. Because of this pattern, near-miss reports give a site the chance to fix a hazard before it produces an actual injury. Sites that treat near-miss reporting as blame-free receive far more reports, and more reports mean more hazards found and corrected. Punishing workers who report near-misses discourages reporting and hides hazards rather than removing them.'},
  rc_p9:{title:'What a Circuit Breaker Does',text:'A circuit breaker is an automatic switch that protects an electrical circuit from damage caused by too much current. When current stays within the circuit\'s rated limit, the breaker remains closed and electricity flows normally. If a fault such as a short circuit or an overload pushes the current above the rating, the breaker senses the excess and trips, opening the circuit and stopping the flow. Unlike a fuse, which must be replaced after it operates once, a breaker can be reset after the underlying problem is fixed. Resetting a breaker without finding the cause of the trip is unsafe, because the fault that tripped it is usually still present. Repeated tripping is a signal that the circuit needs professional attention, not a bigger breaker.'},
  rc_p10:{title:'The Morning Briefing',text:'Every shift at the Hartwell site begins with a ten-minute briefing. The foreman reviews the day\'s tasks, assigns each crew member a role, and calls out any hazards specific to that day, such as overnight rain making scaffolding slick or a delivery truck scheduled to back into the work area at noon. Crew members are expected to ask questions during the briefing rather than guess later. On Tuesday, a new apprentice named Marcus noticed his task list mentioned a scissor lift he had never operated. Instead of staying quiet, he raised it during the briefing. The foreman paired him with a certified operator for the morning and scheduled him for lift training the following week. The delay cost twenty minutes; an untrained operator on a lift could have cost far more.'},
  rc_p11:{title:'How Apprenticeship Works',text:'An apprenticeship combines paid, on-the-job training with classroom instruction. Apprentices earn wages from their first day, and their pay rises in scheduled steps as they demonstrate new skills. A typical electrical apprenticeship lasts several years and pairs each apprentice with experienced journey-level workers on real jobsites. Classroom hours cover theory such as electrical code, mathematics, and blueprint reading, while jobsite hours turn that theory into hands-on skill. Apprentices must log a required number of both classroom and on-the-job hours to complete the program. At completion, an apprentice becomes a journey-level worker, qualified to work without direct supervision and to help train the next generation of apprentices. Unlike many career paths, apprenticeship produces no student debt, because the training is paid rather than paid for.'}
